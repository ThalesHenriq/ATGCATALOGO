<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ArtefatoGeek • Catálogo 3D Impresso</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    :root {
      --navy: #0A1428;
      --yellow: #F5C518;
      --orange: #FF9F1C;
      --dark: #1A2332;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--navy);
      color: #eee;
      line-height: 1.6;
    }

    header {
      background: rgba(10, 20, 40, 0.98);
      backdrop-filter: blur(10px);
      position: fixed;
      width: 100%;
      z-index: 1000;
      padding: 15px 5%;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo img { height: 55px; border-radius: 8px; }

    .cart-icon {
      position: relative;
      font-size: 1.7rem;
      cursor: pointer;
    }

    .cart-count {
      position: absolute;
      top: -8px;
      right: -8px;
      background: var(--orange);
      color: black;
      font-size: 0.85rem;
      font-weight: bold;
      min-width: 20px;
      height: 20px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2px 6px;
    }

    .cart-sidebar {
      position: fixed;
      top: 0;
      right: -420px;
      width: 400px;
      height: 100%;
      background: var(--dark);
      transition: right 0.4s ease;
      z-index: 2000;
      padding: 25px;
      overflow-y: auto;
    }

    .cart-sidebar.open { right: 0; }

    .cart-item {
      display: flex;
      gap: 12px;
      background: #0f1625;
      padding: 12px;
      border-radius: 12px;
      margin-bottom: 15px;
    }

    .cart-item img {
      width: 70px;
      height: 70px;
      object-fit: cover;
      border-radius: 8px;
    }

    .filters {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
      margin: 25px 0;
    }

    .search-bar, select {
      padding: 14px 20px;
      border-radius: 50px;
      border: none;
      background: var(--dark);
      color: white;
      font-size: 1.05rem;
    }

    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 22px;
      padding: 20px 0;
    }

    .card {
      background: var(--dark);
      border-radius: 16px;
      overflow: hidden;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      border: 1px solid rgba(245, 197, 24, 0.1);
      cursor: pointer;
    }

    .card:hover {
      transform: translateY(-12px);
      box-shadow: 0 20px 40px rgba(255, 159, 28, 0.3);
    }

    .card img {
      width: 100%;
      height: 260px;
      object-fit: cover;
      transition: transform 0.6s ease;
    }

    .card:hover img { transform: scale(1.1); }

    .card-body { padding: 18px; }

    .card h3 { color: var(--yellow); margin-bottom: 8px; }

    .price { font-size: 1.6rem; font-weight: bold; color: var(--orange); margin: 10px 0; }

    .btn {
      background: linear-gradient(45deg, var(--orange), #ffb833);
      color: #000;
      border: none;
      padding: 14px;
      border-radius: 50px;
      font-weight: bold;
      width: 100%;
      cursor: pointer;
      margin-top: 10px;
    }

    .btn-cart {
      background: var(--yellow);
      margin-top: 8px;
    }

    .total { font-size: 1.6rem; font-weight: bold; color: var(--yellow); text-align: center; margin: 25px 0; }

    .btn-whatsapp {
      background: #25D366;
      color: white;
      border: none;
      padding: 16px;
      border-radius: 50px;
      font-size: 1.15rem;
      font-weight: bold;
      width: 100%;
      cursor: pointer;
    }

    .modal {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.97);
      z-index: 3000;
      align-items: center;
      justify-content: center;
    }

    footer { text-align: center; padding: 40px 20px; background: #0A1428; color: #777; }
  </style>
</head>
<body>

  <header>
    <a href="#" class="logo">
      <img src="logo.jpeg" alt="Logo">
    </a>
    <div class="cart-icon" onclick="toggleCart()">
      <i class="fas fa-shopping-cart"></i>
      <span class="cart-count" id="cartCount">0</span>
    </div>
  </header>

  <!-- Welcome -->
  <div id="welcome" class="welcome">
    <div class="welcome-content" style="text-align:center;">
      <img src="logo.jpeg" alt="ArtefatoGeek" style="height:110px; margin-bottom:20px; border-radius:12px;">
      <h1>Bem-vindo à ArtefatoGeek</h1>
      <p style="font-size:1.3rem; margin:15px 0 30px;">Modelos 3D Impressos com Qualidade</p>
      <button onclick="hideWelcome()" class="btn" style="padding:16px 50px; font-size:1.2rem;">Explorar Catálogo</button>
    </div>
  </div>

  <div class="main">
    <div class="hero">
      <div class="container">
        <h2 style="font-size:2.4rem; color:white;">Nossos Modelos Impressos</h2>
        <p style="color:#ccc; font-size:1.2rem;">Fotos reais • Qualidade profissional</p>
      </div>
    </div>

    <div class="container">
      <div class="filters">
        <input type="text" id="search" class="search-bar" placeholder="🔍 Buscar modelo..." onkeyup="filterCatalog()">
        <select id="category" onchange="filterCatalog()">
          <option value="">Todas as Categorias</option>
          <option value="decoracao">Decoração</option>
          <option value="moveis">Móveis & Suportes</option>
          <option value="organizadores">Organizadores</option>
          <option value="figuras">Figuras & Miniaturas</option>
        </select>
      </div>

      <div class="card-grid" id="catalog"></div>
    </div>
  </div>

  <!-- Carrinho -->
  <div id="cartSidebar" class="cart-sidebar">
    <h2><i class="fas fa-shopping-cart"></i> Meu Carrinho</h2>
    <div id="cartItems" style="margin:20px 0;"></div>
    <div class="total">Total: R$ <span id="cartTotal">0.00</span></div>
    <button class="btn-whatsapp" onclick="sendToWhatsApp()">
      <i class="fab fa-whatsapp"></i> Enviar Pedido pelo WhatsApp
    </button>
    <button onclick="toggleCart()" style="margin-top:12px; background:#444; width:100%; padding:14px; border:none; border-radius:50px; color:white;">Fechar</button>
  </div>

  <!-- Modal -->
  <div id="modal" class="modal">
    <div class="modal-content" style="max-width:90%; text-align:center;">
      <button onclick="closeModal()" style="position:absolute; top:-15px; right:-15px; background:white; color:black; border:none; width:45px; height:45px; border-radius:50%; font-size:1.6rem; cursor:pointer;">×</button>
      <img id="modalImage" src="" style="max-width:100%; max-height:75vh; border-radius:12px;">
    </div>
  </div>

  <footer>
    <p>© 2026 ArtefatoGeek • 3D Makers • Feito com paixão em impressão 3D</p>
  </footer>

  <script>
    let cart = [];

    const products = [
      { id:1, nome:"Caneca mosnters", descricao:"Caneca monsters", preco:44.90, categoria:"decoracao", imagens:["imagens/caneca.jpeg"] },
      { id:2, nome:"Cesta Decorativa", descricao:"Cesta organizadora em filamento madeira", preco:65.00, categoria:"organizadores", imagens:["imagens/cesta-decorativa.jpg"] },
      { id:3, nome:"Suporte para Fone", descricao:"Suporte minimalista para celular", preco:45.00, categoria:"moveis", imagens:["imagens/suporte-fone.jpg"] },
      { id:4, nome:"Dragão Fantasia", descricao:"Miniatura detalhada em resina", preco:135.00, categoria:"figuras", imagens:["imagens/dragao.jpg"] },
      { id:5, nome:"Porta-joias", descricao:"Porta joias com tampa articulada", preco:78.00, categoria:"organizadores", imagens:["imagens/porta-joias.jpg"] },
      { id:6, nome:"Abajur Moderno", descricao:"Abajur geométrico em PLA branco", preco:95.00, categoria:"decoracao", imagens:["imagens/abajur-moderno.jpg"] },
      { id:7, nome:"Suporte para Notebook", descricao:"Suporte ergonômico para laptop", preco:68.00, categoria:"moveis", imagens:["imagens/suporte-notebook.jpg"] },
      { id:8, nome:"Organizador de Mesa", descricao:"Organizador com 6 divisórias", preco:52.00, categoria:"organizadores", imagens:["imagens/organizador-mesa.jpg"] },
      { id:9, nome:"Busto de Goku", descricao:"Miniatura colecionável", preco:120.00, categoria:"figuras", imagens:["imagens/goku.jpg"] },
      { id:10, nome:"Porta Controle", descricao:"Porta controle remoto com 4 espaços", preco:48.00, categoria:"organizadores", imagens:["imagens/porta-controle.jpg"] },
      { id:11, nome:"Vaso Suspenso", descricao:"Vaso com suporte de parede", preco:75.00, categoria:"decoracao", imagens:["imagens/vaso-suspenso.jpg"] },
      { id:12, nome:"Miniatura de Lobo", descricao:"Lobo em pose dinâmica", preco:98.00, categoria:"figuras", imagens:["imagens/lobo.jpg"] }
    ];

    function addToCart(productId) {
      const product = products.find(p => p.id === productId);
      cart.push(product);
      updateCart();
      alert(`${product.nome} foi adicionado ao carrinho! 🛒`);
    }

    function updateCart() {
      document.getElementById('cartCount').textContent = cart.length;
      let html = '';
      let total = 0;

      cart.forEach((item, index) => {
        total += item.preco;
        html += `
          <div class="cart-item">
            <img src="${item.imagens[0]}" alt="${item.nome}">
            <div style="flex:1;">
              <strong>${item.nome}</strong><br>
              <small>R$ ${item.preco.toFixed(2)}</small><br>
              <button onclick="removeFromCart(${index})" style="background:none;border:none;color:#ff6666;cursor:pointer;margin-top:8px;">Remover</button>
            </div>
          </div>`;
      });

      document.getElementById('cartItems').innerHTML = html || "<p style='text-align:center;color:#777;padding:40px 0;'>Seu carrinho está vazio</p>";
      document.getElementById('cartTotal').textContent = total.toFixed(2);
    }

    function removeFromCart(index) {
      cart.splice(index, 1);
      updateCart();
    }

    function toggleCart() {
      document.getElementById('cartSidebar').classList.toggle('open');
    }

    function sendToWhatsApp() {
      if (cart.length === 0) return alert("Seu carrinho está vazio!");

      let message = "Olá ArtefatoGeek! Gostaria de comprar:\n\n";
      let total = 0;

      cart.forEach(item => {
        message += `• ${item.nome} - R$ ${item.preco.toFixed(2)}\n`;
        total += item.preco;
      });

      message += `\n*Total: R$ ${total.toFixed(2)}*\n\n`;
      message += "Pode me confirmar disponibilidade e formas de pagamento?";

      const phone = "551695484167"; // ← TROQUE PELO SEU NÚMERO COM DDD
      const url = `https://wa.me/${phone}?text=${encodeURIComponent(message)}`;
      window.open(url, '_blank');
    }

    function renderCatalog(filtered) {
      const container = document.getElementById('catalog');
      container.innerHTML = '';

      filtered.forEach(product => {
        container.innerHTML += `
          <div class="card" onclick="openGallery(${products.indexOf(product)})">
            <img src="${product.imagens[0]}" alt="${product.nome}">
            <div class="card-body">
              <h3>${product.nome}</h3>
              <p>${product.descricao}</p>
              <div class="price">R$ ${product.preco.toFixed(2)}</div>
              <button class="btn btn-cart" onclick="event.stopImmediatePropagation(); addToCart(${product.id})">
                <i class="fas fa-cart-plus"></i> Adicionar ao Carrinho
              </button>
            </div>
          </div>`;
      });
    }

    function filterCatalog() {
      const searchTerm = document.getElementById('search').value.toLowerCase();
      const selectedCategory = document.getElementById('category').value;

      const filtered = products.filter(p => {
        const matchSearch = p.nome.toLowerCase().includes(searchTerm) || p.descricao.toLowerCase().includes(searchTerm);
        const matchCategory = !selectedCategory || p.categoria === selectedCategory;
        return matchSearch && matchCategory;
      });

      renderCatalog(filtered);
    }

    function openGallery(index) {
      const product = products[index];
      document.getElementById('modalImage').src = product.imagens[0];
      document.getElementById('modal').style.display = 'flex';
    }

    function closeModal() {
      document.getElementById('modal').style.display = 'none';
    }

    function hideWelcome() {
      const w = document.getElementById('welcome');
      w.style.opacity = '0';
      setTimeout(() => w.style.display = 'none', 1200);
    }

    window.onload = () => renderCatalog(products);
  </script>
</body>
</html>
